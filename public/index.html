<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhanhHub Dashboard | Anh Hùng Đẹp Trai</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c83ff;
            --success: #059669;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            margin-bottom: 12px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .status-badge {
            display: inline-flex;
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 20px;
        }
        .status-connected { background: rgba(5, 150, 105, 0.1); color: var(--success); border: 1px solid rgba(5, 150, 105, 0.2); }
        .status-disconnected { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        #authSection, #dashboardSection { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>NhanhHub</h1>

    <!-- SECTION: LOGIN / REGISTER -->
    <div id="authSection">
        <p style="color: #64748b; margin-bottom: 24px;">Đăng nhập để quản lý Nhanh.vn</p>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="hung@example.com">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="btnLogin" class="btn btn-primary">Đăng nhập</button>
        <button id="btnRegister" class="btn btn-secondary">Đăng ký tài khoản</button>
    </div>

    <!-- SECTION: DASHBOARD -->
    <div id="dashboardSection">
        <p id="userWelcome" style="color: #64748b; margin-bottom: 20px;"></p>
        <div id="statusBadge" class="status-badge">● Đang kiểm tra...</div>
        
        <button id="btnConnect" class="btn btn-primary" style="display:none;">Kết nối Nhanh.vn</button>
        <button id="btnDisconnect" class="btn btn-secondary" style="display:none;">Hủy liên kết</button>
        <button id="btnLogout" class="btn btn-secondary" style="margin-top: 20px; border:none;">Đăng xuất</button>
    </div>

    <p id="msg" style="font-size: 0.8rem; margin-top: 15px; color: #ef4444;"></p>
</div>

<script>
    const token = localStorage.getItem('access_token');
    const authSection = document.getElementById('authSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const msg = document.getElementById('msg');

    if (token) {
        showDashboard();
        // Kiểm tra xem có vừa kết nối thành công không
        if (window.location.search.includes('linked=success')) {
            msg.style.color = '#059669';
            msg.innerText = '🎉 Kết nối Nhanh.vn thành công!';
        }
    } else {
        authSection.style.display = 'block';
    }

    // Đăng ký
    document.getElementById('btnRegister').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        msg.innerText = data.message || (data.error ? data.message : 'Đăng ký thành công!');
    };

    // Đăng nhập
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.access_token) {
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_email', email);
            location.reload();
        } else {
            msg.innerText = 'Sai email hoặc mật khẩu!';
        }
    };

    async function showDashboard() {
        authSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        document.getElementById('userWelcome').innerText = `Chào, ${localStorage.getItem('user_email')}!`;
        
        try {
            const res = await fetch('/nhanh/status', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
            });
            
            if (res.status === 401) { logout(); return; }
            
            const data = await res.json();
            const badge = document.getElementById('statusBadge');
            if (data.linked) {
                badge.innerText = '● Đã liên kết Nhanh.vn';
                badge.className = 'status-badge status-connected';
                document.getElementById('btnDisconnect').style.display = 'block';
            } else {
                badge.innerText = '○ Chưa liên kết';
                badge.className = 'status-badge status-disconnected';
                document.getElementById('btnConnect').style.display = 'block';
            }
        } catch (e) {
            msg.innerText = 'Lỗi kết nối!';
        }
    }

    document.getElementById('btnConnect').onclick = () => {
        // Chuyển hướng kèm theo Token để Backend biết là ai
        window.location.href = `/nhanh/connect?token=${localStorage.getItem('access_token')}`;
    };

    document.getElementById('btnDisconnect').onclick = async () => {
        if (!confirm('Hủy liên kết?')) return;
        await fetch('/nhanh/disconnect', {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
        });
        location.reload();
    };

    document.getElementById('btnLogout').onclick = logout;

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>

</body>
</html>
