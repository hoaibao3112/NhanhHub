<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NhanhHub Storefront | Premium Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c83ff;
            --primary-glow: rgba(12, 131, 255, 0.5);
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --glass: rgba(15, 23, 42, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(12, 131, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(12, 131, 255, 0.05) 0%, transparent 40%);
        }

        /* Navbar */
        .navbar {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--card-border);
            transition: 0.3s;
        }

        .logo { 
            font-weight: 800; 
            font-size: 1.6rem; 
            letter-spacing: -1px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #1d4ed8); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--card-border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cart-icon:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.05);
        }

        .cart-count { 
            background: var(--primary); 
            color: white; 
            padding: 2px 10px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Hero */
        .hero {
            padding: 100px 5% 60px;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Product Grid */
        .container { padding: 40px 8%; max-width: 1400px; margin: 0 auto; }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 32px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .product-card:hover { 
            transform: translateY(-15px); 
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(12, 131, 255, 0.1);
        }

        .product-img-container {
            width: 100%;
            height: 280px;
            background: linear-gradient(45deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-img-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.3) 100%);
        }

        .product-img {
            font-size: 6rem;
            transition: 0.5s;
            z-index: 1;
        }

        .product-card:hover .product-img {
            transform: scale(1.2) rotate(5deg);
        }

        .product-content { padding: 25px; }
        .product-name { font-size: 1.25rem; font-weight: 700; margin: 0 0 12px; height: 1.5em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-price { color: var(--primary); font-weight: 800; font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .product-stock { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .stock-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }

        .btn-buy {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(12, 131, 255, 0.3);
        }

        .btn-buy:hover { 
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(12, 131, 255, 0.4);
        }

        .btn-buy:active { transform: translateY(0); }

        /* Sidebar Cart */
        .sidebar {
            position: fixed;
            top: 0; right: -450px;
            width: 450px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(30px);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--card-border);
        }

        .sidebar.active { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .sidebar-header h3 { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .close-cart { cursor: pointer; font-size: 1.5rem; opacity: 0.5; transition: 0.3s; }
        .close-cart:hover { opacity: 1; transform: rotate(90deg); }

        .cart-items { flex: 1; overflow-y: auto; padding-right: 10px; }
        .cart-items::-webkit-scrollbar { width: 4px; }
        .cart-items::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

        .cart-item { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 25px; 
            align-items: center; 
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }
        .cart-item-img { width: 64px; height: 64px; background: #0f172a; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; overflow: hidden; }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-info h4 { margin: 0 0 6px; font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item-info p { margin: 0; color: var(--primary); font-size: 0.9rem; font-weight: 700; }

        .cart-footer { padding-top: 30px; border-top: 1px solid var(--card-border); }
        .total-row { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem; margin-bottom: 25px; }

        /* Form */
        .checkout-form { 
            margin-top: 25px; 
            display: none; 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            border-radius: 24px;
            border: 1px solid var(--card-border);
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 100vw;
                right: -100vw;
                padding: 24px;
            }
            .cart-item { gap: 14px; padding: 12px; }
            .cart-item-img { width: 54px; height: 54px; border-radius: 12px; }
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--card-border); 
            background: #020617; 
            color: white; 
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        #successOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .success-card {
            background: var(--card-bg);
            padding: 60px 40px;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--success);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .loader {
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 100px 0; color: var(--text-muted); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; display: block; opacity: 0.3; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NhanhHub Store</div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Giỏ hàng <span class="cart-count" id="cartCount">0</span>
        </div>
    </nav>

    <div class="hero">
        <h1>Khám phá BST Mới</h1>
        <p>Những sản phẩm tốt nhất được đồng bộ trực tiếp từ hệ thống Nhanh.vn với thời gian thực.</p>
    </div>

    <div class="container">
        <div id="loader" class="loader"></div>
        <div id="productGrid" class="product-grid">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Giỏ hàng của bạn</h3>
            <span class="close-cart" onclick="toggleCart()">✕</span>
        </div>
        
        <div id="cartItems" class="cart-items">
            <!-- Cart items here -->
        </div>

        <div class="cart-footer">
            <div class="total-row">
                <span>Tổng cộng</span>
                <span id="cartTotal">0đ</span>
            </div>

            <button id="btnGoCheckout" class="btn-buy" style="background: linear-gradient(135deg, var(--success), #059669);" onclick="showCheckoutForm()">THANH TOÁN NGAY</button>
            
            <div id="checkoutForm" class="checkout-form">
                <div class="form-group">
                    <label>Họ tên người nhận</label>
                    <input type="text" id="custName" value="Khách Hàng Demo">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="custPhone" value="0987654321">
                </div>
                <div class="form-group">
                    <label>Địa chỉ giao hàng</label>
                    <input type="text" id="address" value="23 Chiến Thắng, Hà Đông, Hà Nội">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; background: rgba(12, 131, 255, 0.1); padding: 12px; border-radius: 12px; border: 1px solid var(--primary);">
                    <input type="checkbox" id="isMock" style="width: 20px; height: 20px; cursor: pointer;">
                    <label for="isMock" style="margin-bottom: 0; cursor: pointer; color: var(--primary); font-weight: 700;">CHẾ ĐỘ DEMO (BỎ QUA LỖI KHO)</label>
                </div>
                <button id="btnConfirmBuy" class="btn-buy" onclick="doSmartCheckout()">HOÀN TẤT ĐẶT HÀNG</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay">
        <div class="success-card">
            <div style="font-size: 5rem; color: var(--success); margin-bottom: 20px;">✓</div>
            <h2 style="color: white; font-size: 1.8rem; margin-bottom: 10px;">ĐẶT HÀNG THÀNH CÔNG!</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Đơn hàng của bạn đã được chuyển tới hệ thống xử lý của Nhanh.vn.</p>
            <p id="orderInfo" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; font-family: monospace; color: var(--primary); font-weight: 700;"></p>
            <button class="btn-buy" onclick="location.reload()" style="margin-top: 20px;">Tiếp tục mua sắm</button>
        </div>
    </div>

    <script>
        // Đồng nhất sử dụng 'access_token' giống index.html
        let token = localStorage.getItem('access_token');
        
        // Nếu vừa kết nối xong có token trên URL, hãy lưu lại
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            localStorage.setItem('access_token', urlToken);
            token = urlToken;
            // Xóa token trên URL cho đẹp
            window.history.replaceState({}, document.title, "/shop.html");
        }

        if (!token) {
            window.location.href = '/index.html';
        }

        let cart = [];

        // 1. Tải sản phẩm từ Nhanh.vn
        function getNormalizedPrice(product) {
            const raw = product.salePrice ?? product.price ?? product.priceSell ?? product.prices?.retail ?? 0;
            const digits = raw.toString().replace(/\./g, '');
            const value = parseInt(digits, 10);
            return Number.isNaN(value) ? 0 : value;
        }
        async function loadProducts() {
            try {
                const res = await fetch('/nhanh/products', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.message || 'Không thể tải sản phẩm');
                }

                document.getElementById('loader').style.display = 'none';

                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';

                // Dò tìm mảng sản phẩm một cách thông minh
                let products = [];
                if (data.data) {
                    if (Array.isArray(data.data.products)) products = data.data.products;
                    else if (Array.isArray(data.data.items)) products = data.data.items;
                    else if (Array.isArray(data.data)) products = data.data;
                    else if (typeof data.data === 'object') {
                        // Trường hợp Nhanh.vn trả về object với key là ID (v2.0 cũ)
                        products = Object.values(data.data).filter(item => typeof item === 'object' && item.id);
                    }
                }
                
                if (products.length === 0) {
                    const isTokenError = data.code === 0;
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1">
                            <span class="empty-state-icon">${isTokenError ? '🔑' : '🛍️'}</span>
                            <h3>${isTokenError ? 'Hết hạn kết nối' : 'Chưa có sản phẩm nào'}</h3>
                            <p>${isTokenError ? 'Kết nối với Nhanh.vn đã hết hạn hoặc không hợp lệ. Vui lòng kết nối lại để tiếp tục.' : 'Hãy tạo sản phẩm trên hệ thống Nhanh.vn của bạn để bắt đầu bán hàng.'}</p>
                            ${isTokenError ? '<a href="/" class="btn-buy" style="display:inline-block; margin-top:20px; text-decoration:none">KẾT NỐI LẠI NGAY</a>' : ''}
                        </div>
                    `;
                    return;
                }

                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    // Thử mọi cách để lấy link ảnh thật
                    let imgUrl = p.image || p.thumbnail || p.imagePath || p.images?.avatar || '';
                    
                    // Nếu là đường dẫn tương đối, ghép với imageHost
                    if (imgUrl && !imgUrl.startsWith('http')) {
                        const host = p.imageHost || 'https://p0.nhanh.vn';
                        imgUrl = host + imgUrl;
                    }

                    p.imageUrl = imgUrl || '';

                    if (!imgUrl && p.images && p.images.length > 0) {
                        const firstImg = p.images[0];
                        imgUrl = typeof firstImg === 'string' ? firstImg : (firstImg.link || firstImg.path);
                    }

                    // Sau khi tìm được imgUrl (từ bất kỳ nguồn nào), kiểm tra lại host nếu cần
                    if (imgUrl && !imgUrl.startsWith('http')) {
                        const host = p.imageHost || 'https://p0.nhanh.vn';
                        imgUrl = host + imgUrl;
                    }

                    let emoji = '📦';
                    const name = p.name.toLowerCase();
                    if (name.includes('hoodie')) emoji = '🧥';
                    else if (name.includes('áo')) emoji = '👕';
                    else if (name.includes('giày')) emoji = '👟';
                    else if (name.includes('quần')) emoji = '👖';

                    const stock = p.available ?? p.inventory?.available ?? 100;
                    
                    const normalizedPrice = getNormalizedPrice(p);
                    p.price = normalizedPrice;
                    const price = normalizedPrice.toLocaleString();

                    card.innerHTML = `
                        <div class="product-img-container">
                            ${imgUrl ? `<img src="${imgUrl}" class="product-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">` : ''}
                            <div class="product-img" style="${imgUrl ? 'display:none' : 'display:flex'}">${emoji}</div>
                        </div>
                        <div class="product-content">
                            <h3 class="product-name" title="${p.name}">${p.name}</h3>
                            <span class="product-price">${price}đ</span>
                            <div class="product-stock">
                                <span class="stock-dot"></span>
                                Còn lại ${stock} sản phẩm
                            </div>
                            <button class="btn-buy" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&apos;")})'>THÊM VÀO GIỎ</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loader').style.display = 'none';
                alert('Lỗi: ' + e.message);
            }
        }

        // 2. Tải danh sách kho
        async function loadDepots() {
            try {
                const res = await fetch('/nhanh/depots', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.message || 'Không thể tải danh sách kho');
                }

                const select = document.getElementById('depotId');
                select.innerHTML = ''; // Clear existing

                if (data.data) {
                    let depots = [];
                    if (Array.isArray(data.data)) {
                        depots = data.data;
                    } else if (typeof data.data === 'object') {
                        depots = Object.values(data.data).filter(d => d && typeof d === 'object' && d.id);
                    }

                    if (depots.length === 0) {
                        const opt = document.createElement('option');
                        opt.innerText = '-- Không tìm thấy kho --';
                        select.appendChild(opt);
                    } else {
                        depots.forEach(d => {
                            const opt = document.createElement('option');
                            opt.value = d.id;
                            opt.innerText = d.name;
                            select.appendChild(opt);
                        });
                    }
                } else {
                    const opt = document.createElement('option');
                    opt.innerText = '-- Lỗi tải kho --';
                    select.appendChild(opt);
                }
            } catch (e) {
                console.error('Lỗi loadDepots:', e);
                const select = document.getElementById('depotId');
                select.innerHTML = '<option>-- Lỗi kết nối --</option>';
            }
        }

        function addToCart(product) {
            cart.push(product);
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const container = document.getElementById('cartItems');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += parseInt(item.price);
                const div = document.createElement('div');
                div.className = 'cart-item';
                
                let emoji = '📦';
                const name = item.name.toLowerCase();
                if (name.includes('áo')) emoji = '👕';
                else if (name.includes('hoodie')) emoji = '🧥';

                const cartThumb = item.imageUrl
                    ? `<img src="${item.imageUrl}" alt="${item.name}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;">`
                    : emoji;

                div.innerHTML = `
                    <div class="cart-item-img">${cartThumb}</div>
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>${parseInt(item.price).toLocaleString()}đ</p>
                    </div>
                    <span onclick="removeFromCart(${index})" class="close-cart" style="font-size: 1rem">✕</span>
                `;
                container.appendChild(div);
            });
            document.getElementById('cartTotal').innerText = total.toLocaleString() + 'đ';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart(show = null) {
            const sidebar = document.getElementById('sidebar');
            if (show === true) sidebar.classList.add('active');
            else if (show === false) sidebar.classList.remove('active');
            else sidebar.classList.toggle('active');
        }

        function showCheckoutForm() {
            if (cart.length === 0) return alert('Giỏ hàng trống!');
            document.getElementById('btnGoCheckout').style.display = 'none';
            document.getElementById('checkoutForm').style.display = 'block';
        }

        async function doSmartCheckout() {
            const btn = document.getElementById('btnConfirmBuy');
            btn.innerText = '⏳ ĐANG XỬ LÝ...';
            btn.disabled = true;

            const checkoutData = {
                isMock: document.getElementById('isMock').checked,
                depotId: document.getElementById('depotId').value,
                shippingTo: {
                    name: document.getElementById('custName').value,
                    mobile: document.getElementById('custPhone').value,
                    cityId: 254, // Hà Nội mặc định
                    address: document.getElementById('address').value
                },
                products: cart.map(p => ({
                    id: p.id,
                    price: p.price,
                    quantity: 1
                }))
            };

            try {
                const res = await fetch('/nhanh/smart-checkout', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(checkoutData)
                });
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('successOverlay').style.display = 'flex';
                    document.getElementById('orderInfo').innerText = `ORDER ID: ${result.data?.orderId || 'SUCCESS'}`;
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (e) {
                alert('Lỗi kết nối server!');
            } finally {
                btn.innerText = 'HOÀN TẤT ĐẶT HÀNG';
                btn.disabled = false;
            }
        }

        // Initialize
        loadProducts();
        loadDepots();

        // Navbar effect on scroll
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                nav.style.padding = '10px 8%';
                nav.style.background = 'rgba(15, 23, 42, 0.9)';
            } else {
                nav.style.padding = '15px 8%';
                nav.style.background = 'var(--glass)';
            }
        });
    </script>
</body>
</html>
